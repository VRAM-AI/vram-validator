name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout VRAM-HUB source
        uses: actions/checkout@v4
        with:
          repository: VRAM-AI/VRAM-HUB
          ref: master
          token: ${{ secrets.BUILD_TOKEN }}

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - run: sudo apt-get install -y libssl-dev pkg-config libclang-dev clang

      - name: Build binaries
        run: |
          cargo build --release --bin vramhub-validator --bin vramhub-cli
          cp target/release/vramhub-validator vram-validator-linux-x86_64
          cp target/release/vramhub-cli       vram-cli-linux-x86_64

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            vram-validator-linux-x86_64
            vram-cli-linux-x86_64
          body: |
            ## vram-validator ${{ github.ref_name }}

            ### One-line install

            ```bash
            curl -sSf https://raw.githubusercontent.com/VRAM-AI/vram-validator/main/install.sh | bash
            ```

            ### Manual

            ```bash
            curl -Lo vram-validator \
              https://github.com/VRAM-AI/vram-validator/releases/download/${{ github.ref_name }}/vram-validator-linux-x86_64
            chmod +x vram-validator && sudo mv vram-validator /usr/local/bin/

            curl -Lo vram-cli \
              https://github.com/VRAM-AI/vram-validator/releases/download/${{ github.ref_name }}/vram-cli-linux-x86_64
            chmod +x vram-cli && sudo mv vram-cli /usr/local/bin/
            ```
